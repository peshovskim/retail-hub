<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" aria-hidden="true">
  <!-- Sticker / hand-drawn style carp fishing mark -->
  <rect x="4" y="4" width="112" height="112" rx="18" fill="#fff8f0" stroke="#ff7a00" stroke-width="3"/>
  <!-- Carp body -->
  <path d="M28 62c12-22 38-28 52-24 8 2 14 8 16 14 2 8-4 16-14 20-10 4-24 2-36-6-8-6-14-12-18-4z"
        fill="#ff9c40" stroke="#c55a00" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Tail -->
  <path d="M26 58l-14 8 6-14-6-14 14 8" fill="#ff7a00" stroke="#c55a00" stroke-width="2" stroke-linejoin="round"/>
  <!-- Dorsal fin -->
  <path d="M58 38c4-10 12-14 18-12 4 2 6 8 2 14" fill="#ffb366" stroke="#c55a00" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Eye -->
  <circle cx="78" cy="54" r="4" fill="#1a1a1a"/>
  <circle cx="79" cy="53" r="1.2" fill="#fff"/>
  <!-- Mouth / barbels hint -->
  <path d="M88 58c6 2 10 6 12 12" stroke="#c55a00" stroke-width="2" stroke-linecap="round"/>
  <!-- Fishing rod -->
  <path d="M92 22l-8 52" stroke="#5c4033" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M84 74c-2 8-8 14-16 18" stroke="#8b6914" stroke-width="2" stroke-linecap="round"/>
  <!-- Line & bobber -->
  <path d="M84 74v10" stroke="#333" stroke-width="1.2" stroke-dasharray="2 3"/>
  <circle cx="84" cy="88" r="5" fill="#e85d0c" stroke="#a34408" stroke-width="1.5"/>
  <!-- Hook glint -->
  <path d="M68 92c4 6 10 8 16 6" stroke="#c55a00" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
</svg>
