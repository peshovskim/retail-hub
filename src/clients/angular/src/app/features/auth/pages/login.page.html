<section class="auth-page" aria-labelledby="auth-login-heading">
  <mat-card class="auth-page__card" appearance="outlined">
    <mat-card-content>
      <h1 id="auth-login-heading" class="auth-page__title">Sign in</h1>
      <p class="auth-page__hint">Use the email and password for your store account.</p>

      @if (errorMessage(); as err) {
        <div class="auth-page__alert" role="alert">{{ err }}</div>
      }

      <form class="auth-page__form" [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="auth-page__field">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="email" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="auth-page__field">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="current-password" />
        </mat-form-field>

        <button
          mat-flat-button
          color="primary"
          class="auth-page__submit"
          type="submit"
          [disabled]="submitting()"
        >
          @if (submitting()) {
            <mat-progress-spinner diameter="20" mode="indeterminate" />
          } @else {
            Sign in
          }
        </button>
      </form>

      <p class="auth-page__footer">
        No account yet?
        <a routerLink="/auth/register">Create one</a>
      </p>
    </mat-card-content>
  </mat-card>
</section>
