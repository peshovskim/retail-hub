<nav class="category-menu" aria-label="Categories">
  @if (loading$ | async) {
    <span class="category-menu__hint">Loading…</span>
  } @else if (error$ | async; as err) {
    <span class="category-menu__hint" role="alert">{{ err }}</span>
  } @else {
    @for (c of (menu$ | async) ?? []; track c.id) {
      <a [routerLink]="['/catalog', 'category', c.slug]" class="category-menu__link">{{ c.name }}</a>
    }
  }
</nav>
