<mat-toolbar class="app-toolbar app-toolbar--shop">
  <div class="app-toolbar__inner">
    <a routerLink="/catalog" class="app-toolbar__logo" aria-label="Fishing Store Pesho home">
      <span class="app-toolbar__logo-mark">
        <img
          class="app-toolbar__logo-img"
          src="brand/fishing-store-logo.svg"
          width="40"
          height="40"
          alt=""
        />
      </span>
      <span class="app-toolbar__brand">FISHING STORE PESHO</span>
    </a>

    <nav class="app-toolbar__nav" aria-label="Primary">
      <a mat-button routerLink="/catalog" class="app-toolbar__link">All products</a>
      <app-category-menu />
    </nav>

    <span class="app-toolbar__fill"></span>

    <div class="app-toolbar__search-cart">
      <div class="app-toolbar__search-with-button">
        <div class="app-toolbar__search-box">
          <mat-icon class="app-toolbar__search-icon" aria-hidden="true">search</mat-icon>
          <input
            type="search"
            class="app-toolbar__search-input"
            placeholder="Search..."
            autocomplete="off"
            enterkeyhint="search"
            aria-label="Search products by name or SKU"
            [ngModel]="catalogSearch.draft()"
            (ngModelChange)="catalogSearch.draft.set($event)"
            (keydown.enter)="onSearchSubmit($event)"
          />
        </div>
        <button
          type="button"
          mat-flat-button
          class="app-toolbar__search-submit"
          (click)="onSearchSubmit()"
        >
          Search
        </button>
      </div>

      <a
        mat-icon-button
        type="button"
        class="app-toolbar__cart"
        routerLink="/cart"
        [attr.aria-label]="'Shopping cart, ' + cartItemCount() + ' items'"
      >
        <mat-icon
          [matBadge]="cartItemCount()"
          [matBadgeHidden]="cartItemCount() === 0"
          matBadgeSize="small"
          matBadgeColor="primary"
          aria-hidden="true"
        >
          shopping_cart
        </mat-icon>
      </a>
    </div>
  </div>
</mat-toolbar>
